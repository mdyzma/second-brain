services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: secondbraindb
      POSTGRES_USER: midy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql_migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
